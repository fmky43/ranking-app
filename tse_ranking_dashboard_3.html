// ============================================
// State 管理
// ============================================
const STORAGE_DATA = 'tse_ranking_data_v2';
const STORAGE_NAMES = 'tse_ranking_custom_names_v2';
const STORAGE_GITHUB = 'tse_github_config_v1';

let state = {
  data: loadFromStorage(STORAGE_DATA, {}),
  customStockNames: loadFromStorage(STORAGE_NAMES, {}),
  githubConfig: loadFromStorage(STORAGE_GITHUB, { token: '', owner: 'fmky43', repo: 'ranking-app', enabled: false }),
  githubLoading: false,
  reportGenerated: false,
  reportData: null,
  selectedDate: '',
  inputText: '',
  activeTab: 'input',
  message: { type: '', text: '' },
  selectedStocks: [],
  editingStock: null,
  editingName: ''
};

function loadFromStorage(key, defaultValue) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : defaultValue;
  } catch (e) { return defaultValue; }
}

function saveToStorage(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch (e) { console.error('Storage error:', e); }
}

function saveState() {
  saveToStorage(STORAGE_DATA, state.data);
  saveToStorage(STORAGE_NAMES, state.customStockNames);
  saveToStorage(STORAGE_GITHUB, state.githubConfig);
}

// ============================================
// GitHub API（読み込み・保存）
// ============================================
function githubApiUrl() {
  const cfg = state.githubConfig;
  return 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/data.json';
}

function githubHeaders() {
  return {
    'Authorization': 'token ' + state.githubConfig.token,
    'Content-Type': 'application/json',
    'Accept': 'application/vnd.github.v3+json'
  };
}

async function loadFromGitHub() {
  const cfg = state.githubConfig;
  if (!cfg.enabled || !cfg.token || !cfg.owner || !cfg.repo) return false;

  state.githubLoading = true;
  renderDataCount();

  try {
    const resp = await fetch(githubApiUrl(), { headers: githubHeaders() });
    if (resp.ok) {
      const file = await resp.json();
      const raw = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
      const parsed = JSON.parse(raw);
      // 新形式 { rankings, customNames } と旧形式（直接オブジェクト）の両方に対応
      state.data = parsed.rankings || parsed;
      state.customStockNames = parsed.customNames || state.customStockNames;
      // ローカルキャッシュ更新
      saveToStorage(STORAGE_DATA, state.data);
      saveToStorage(STORAGE_NAMES, state.customStockNames);
      state.githubLoading = false;
      return true;
    } else if (resp.status === 404) {
      // data.json がまだ存在しない（新規リポジトリ）は正常
      state.githubLoading = false;
      return true;
    } else {
      state.githubLoading = false;
      return false;
    }
  } catch (e) {
    state.githubLoading = false;
    return false;
  }
}

async function uploadToGitHub() {
  const cfg = state.githubConfig;
  if (!cfg.enabled || !cfg.token || !cfg.owner || !cfg.repo) return;

  showMessage('warning', '☁️ GitHubに保存中...', 0);

  // 現在のファイルの SHA を取得（更新に必要）
  let sha;
  try {
    const getResp = await fetch(githubApiUrl(), { headers: githubHeaders() });
    if (getResp.ok) { sha = (await getResp.json()).sha; }
  } catch (e) {}

  const payload = { rankings: state.data, customNames: state.customStockNames };
  const now = new Date().toISOString().slice(0, 10);
  const body = {
    message: 'データ更新 (' + now + ')',
    content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2)))),
    branch: 'main'
  };
  if (sha) body.sha = sha;

  try {
    const putResp = await fetch(githubApiUrl(), { method: 'PUT', headers: githubHeaders(), body: JSON.stringify(body) });
    if (putResp.ok) {
      showMessage('success', '✅ GitHubに保存しました');
    } else {
      const err = await putResp.json();
      showMessage('error', 'GitHub保存失敗: ' + (err.message || '不明なエラー'), 6000);
    }
  } catch (e) {
    showMessage('error', 'GitHub通信エラー: ' + e.message, 6000);
  }
}

function saveGithubConfig() {
  const token = document.getElementById('ghToken').value.trim();
  const owner = document.getElementById('ghOwner').value.trim();
  const repo = document.getElementById('ghRepo').value.trim();
  const enabled = document.getElementById('ghEnabled').checked;
  state.githubConfig = { token: token, owner: owner, repo: repo, enabled: enabled };
  saveState();
  if (enabled && token) {
    showMessage('warning', '☁️ GitHubからデータを読み込み中...', 0);
    loadFromGitHub().then(function(ok) {
      showMessage(ok ? 'success' : 'error', ok ? 'GitHubからデータを読み込みました' : 'GitHub読み込み失敗。設定を確認してください', 5000);
      render();
    });
  } else {
    showMessage('success', 'GitHub設定を保存しました');
    renderContent();
  }
}

function reloadFromGitHub() {
  showMessage('warning', '☁️ GitHubからデータを再読み込み中...', 0);
  loadFromGitHub().then(function(ok) {
    showMessage(ok ? 'success' : 'error', ok ? 'GitHubからデータを再読み込みしました' : 'GitHub読み込み失敗', 5000);
    render();
  });
}

function getStockName(code) {
  const cleanCode = code.replace('TSE:', '');
  return state.customStockNames[cleanCode] || STOCK_NAMES[cleanCode] || null;
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

function formatNumber(n) {
  return n.toLocaleString();
}

// ============================================
// ビジネスロジック
// ============================================
function validateFormat(text) {
  const lines = text.trim().split('\n').filter(function(l) { return l.trim(); });
  const results = [];
  let i = 0;
  while (i < lines.length) {
    const titleMatch = lines[i].match(/###売買代金ランキング\((\d{4}\/\d{2}\/\d{2})\)/);
    if (!titleMatch) return { valid: false, error: '日付は YYYY/MM/DD 形式で入力してください' };
    const date = titleMatch[1];
    const codesLine = lines[i + 1];
    const amountsLine = lines[i + 2];
    if (!codesLine || !codesLine.startsWith('TSE:') || !amountsLine || !amountsLine.startsWith('売買代金')) {
      return { valid: false, error: 'TradingView形式で入力してください' };
    }
    const codes = codesLine.split(',').map(function(c) { return c.trim(); });
    const amountParts = amountsLine.split(':');
    const amounts = amountParts[1] ? amountParts[1].split(',').map(function(a) { return parseInt(a.trim()); }) : [];
    if (codes.length !== 30) return { valid: false, error: '30銘柄を入力してください（現在: ' + codes.length + '銘柄）' };
    if (amounts.length !== 30 || amounts.some(isNaN)) return { valid: false, error: '売買代金の形式が不正です' };
    results.push({ date: date, codes: codes, amounts: amounts });
    i += 3;
  }
  return { valid: true, results: results };
}

function detectSignals() {
  const data = state.data;
  if (Object.keys(data).length === 0) return {};
  const sortedDates = Object.keys(data).sort();
  const signals = {};

  sortedDates.forEach(function(date, idx) {
    signals[date] = { newRankIn: [], rankOut: [], volumeIncrease: [], multiWeekContinue: [] };
    if (idx === 0) return;
    const prevDate = sortedDates[idx - 1];
    const prevCodes = new Set(data[prevDate].codes);
    const currCodes = new Set(data[date].codes);

    currCodes.forEach(function(code) {
      if (!prevCodes.has(code)) {
        signals[date].newRankIn.push({ code: code, rank: data[date].codes.indexOf(code) + 1 });
      }
    });
    prevCodes.forEach(function(code) {
      if (!currCodes.has(code)) {
        signals[date].rankOut.push({ code: code, prevRank: data[prevDate].codes.indexOf(code) + 1 });
      }
    });
    data[date].codes.forEach(function(code, idx2) {
      const prevIdx = data[prevDate].codes.indexOf(code);
      if (prevIdx !== -1) {
        const prevVol = data[prevDate].amounts[prevIdx];
        const currVol = data[date].amounts[idx2];
        const increase = ((currVol - prevVol) / prevVol) * 100;
        if (increase >= 10) {
          signals[date].volumeIncrease.push({ code: code, increase: increase.toFixed(1), vol: currVol });
        }
      }
    });
  });

  sortedDates.forEach(function(date, idx) {
    if (idx === 0) return;
    const prevDate = sortedDates[idx - 1];
    data[date].codes.forEach(function(code, codeIdx) {
      if (data[prevDate].codes.includes(code)) {
        if (!signals[date].multiWeekContinue.find(function(m) { return m.code === code; })) {
          signals[date].multiWeekContinue.push({ code: code, rank: codeIdx + 1, days: 2 });
        }
      }
    });
  });
  return signals;
}

function getWeekOfDates(referenceStr) {
  const ref = new Date(referenceStr.replace(/\//g, '-') + 'T00:00:00');
  const day = ref.getDay();
  const diffToMon = day === 0 ? -6 : 1 - day;
  const monday = new Date(ref);
  monday.setDate(ref.getDate() + diffToMon);
  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  function fmt(d) { return d.toISOString().slice(0, 10).replace(/-/g, '/'); }
  return { monday: monday, friday: friday, weekStart: fmt(monday), weekEnd: fmt(friday) };
}

function getWeeklyReport(signals) {
  const allDates = Object.keys(state.data).sort();
  if (allDates.length === 0) return null;

  // 最新日付からその週の月〜金を算出してフィルタリング
  const week = getWeekOfDates(allDates[allDates.length - 1]);
  const weekDates = allDates.filter(function(dateStr) {
    const d = new Date(dateStr.replace(/\//g, '-') + 'T00:00:00');
    return d >= week.monday && d <= week.friday;
  });
  if (weekDates.length === 0) return null;

  const allNewRankIn = [], allRankOut = [], allVolumeIncrease = [];
  const allContinueCodes = new Set();
  weekDates.forEach(function(date) {
    if (signals[date]) {
      signals[date].newRankIn.forEach(function(item) { allNewRankIn.push(Object.assign({}, item, { date: date })); });
      signals[date].rankOut.forEach(function(item) { allRankOut.push(Object.assign({}, item, { date: date })); });
      signals[date].volumeIncrease.forEach(function(item) { allVolumeIncrease.push(Object.assign({}, item, { date: date })); });
      signals[date].multiWeekContinue.forEach(function(item) { allContinueCodes.add(item.code); });
    }
  });
  return {
    dates: weekDates,
    weekStart: week.weekStart,
    weekEnd: week.weekEnd,
    newRankIn: allNewRankIn,
    rankOut: allRankOut,
    volumeIncrease: allVolumeIncrease,
    continueCodes: Array.from(allContinueCodes)
  };
}

// ============================================
// 自前SVGチャート描画
// ============================================
function drawLineChart(containerId, data, series, options) {
  options = options || {};
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';

  if (!data || data.length === 0) {
    container.innerHTML = '<div class="empty-state">データが不足しています</div>';
    return;
  }

  const width = container.clientWidth || 800;
  const height = 320;
  const padding = { top: 20, right: 20, bottom: 40, left: 70 };
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;

  let allValues = [];
  series.forEach(function(s) {
    data.forEach(function(d) {
      if (d[s.key] != null && !isNaN(d[s.key])) allValues.push(d[s.key]);
    });
  });
  if (allValues.length === 0) {
    container.innerHTML = '<div class="empty-state">表示するデータがありません</div>';
    return;
  }

  let minY = options.reversed ? Math.max.apply(null, allValues) : Math.min.apply(null, allValues);
  let maxY = options.reversed ? Math.min.apply(null, allValues) : Math.max.apply(null, allValues);
  if (options.forceMin != null) minY = options.forceMin;
  if (options.forceMax != null) maxY = options.forceMax;
  if (!options.reversed) {
    const range = maxY - minY;
    minY = Math.max(0, minY - range * 0.1);
    maxY = maxY + range * 0.1;
  }

  const xStep = data.length > 1 ? innerW / (data.length - 1) : 0;

  function xPos(i) { return padding.left + i * xStep; }
  function yPos(v) {
    if (options.reversed) {
      return padding.top + ((v - minY) / (maxY - minY)) * innerH;
    }
    return padding.top + innerH - ((v - minY) / (maxY - minY)) * innerH;
  }

  let svg = '<svg class="chart-svg" viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none">';

  // Y軸グリッド
  const yTicks = 5;
  for (let i = 0; i <= yTicks; i++) {
    const v = minY + ((maxY - minY) / yTicks) * i;
    const y = options.reversed ? padding.top + (i / yTicks) * innerH : padding.top + innerH - (i / yTicks) * innerH;
    svg += '<line x1="' + padding.left + '" y1="' + y + '" x2="' + (padding.left + innerW) + '" y2="' + y + '" stroke="#334155" stroke-dasharray="3 3"/>';
    const label = options.yFormatter ? options.yFormatter(v) : Math.round(v).toLocaleString();
    svg += '<text x="' + (padding.left - 8) + '" y="' + (y + 4) + '" fill="#94a3b8" font-size="11" text-anchor="end">' + label + '</text>';
  }

  // X軸ラベル
  data.forEach(function(d, i) {
    svg += '<text x="' + xPos(i) + '" y="' + (height - 10) + '" fill="#94a3b8" font-size="11" text-anchor="middle">' + escapeHtml(d.date) + '</text>';
  });

  // ライン
  series.forEach(function(s) {
    const points = data.map(function(d, i) {
      if (d[s.key] == null || isNaN(d[s.key])) return null;
      return xPos(i) + ',' + yPos(d[s.key]);
    }).filter(function(p) { return p !== null; });
    if (points.length > 0) {
      svg += '<polyline points="' + points.join(' ') + '" fill="none" stroke="' + s.color + '" stroke-width="2"/>';
      // ドット
      data.forEach(function(d, i) {
        if (d[s.key] != null && !isNaN(d[s.key])) {
          svg += '<circle cx="' + xPos(i) + '" cy="' + yPos(d[s.key]) + '" r="3" fill="' + s.color + '"/>';
        }
      });
    }
  });

  svg += '</svg>';
  container.innerHTML = svg;

  // 凡例
  if (series.length > 0 && options.showLegend !== false) {
    let legend = '<div class="chart-legend">';
    series.forEach(function(s) {
      legend += '<div class="legend-item"><span class="legend-dot" style="background:' + s.color + '"></span>' + escapeHtml(s.label) + '</div>';
    });
    legend += '</div>';
    container.insertAdjacentHTML('beforeend', legend);
  }
}

function drawBarChart(containerId, data, valueKey, options) {
  options = options || {};
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';

  if (!data || data.length === 0) {
    container.innerHTML = '<div class="empty-state">データが不足しています</div>';
    return;
  }

  const width = container.clientWidth || 800;
  const height = 240;
  const padding = { top: 20, right: 20, bottom: 40, left: 70 };
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;

  const values = data.map(function(d) { return d[valueKey]; });
  const maxY = Math.max.apply(null, values) * 1.1;
  const minY = 0;

  const barWidth = innerW / data.length * 0.7;
  const barGap = innerW / data.length * 0.3;

  let svg = '<svg class="chart-svg" viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none">';

  // Y軸グリッド
  const yTicks = 5;
  for (let i = 0; i <= yTicks; i++) {
    const v = (maxY / yTicks) * i;
    const y = padding.top + innerH - (i / yTicks) * innerH;
    svg += '<line x1="' + padding.left + '" y1="' + y + '" x2="' + (padding.left + innerW) + '" y2="' + y + '" stroke="#334155" stroke-dasharray="3 3"/>';
    svg += '<text x="' + (padding.left - 8) + '" y="' + (y + 4) + '" fill="#94a3b8" font-size="11" text-anchor="end">' + Math.round(v).toLocaleString() + '</text>';
  }

  // バー
  data.forEach(function(d, i) {
    const x = padding.left + (innerW / data.length) * i + barGap / 2;
    const barH = ((d[valueKey] - minY) / (maxY - minY)) * innerH;
    const y = padding.top + innerH - barH;
    svg += '<rect x="' + x + '" y="' + y + '" width="' + barWidth + '" height="' + barH + '" fill="' + (options.color || '#fbbf24') + '" rx="4"/>';
    svg += '<text x="' + (x + barWidth / 2) + '" y="' + (height - 10) + '" fill="#94a3b8" font-size="11" text-anchor="middle">' + escapeHtml(d.date) + '</text>';
  });

  svg += '</svg>';
  container.innerHTML = svg;
}

function showMessage(type, text, duration) {
  state.message = { type: type, text: text };
  renderMessage();
  if (duration !== 0) {
    setTimeout(function() {
      state.message = { type: '', text: '' };
      renderMessage();
    }, duration || 3000);
  }
}

function handleAddData() {
  const dateInput = document.getElementById('dateInput');
  const textInput = document.getElementById('textInput');
  if (!dateInput || !textInput) return;
  state.selectedDate = dateInput.value ? dateInput.value.replace(/-/g, '/') : '';
  state.inputText = textInput.value;

  if (!state.selectedDate && !state.inputText.includes('###')) {
    showMessage('error', '日付を選択してください');
    return;
  }
  const validation = validateFormat(state.inputText);
  if (!validation.valid) {
    showMessage('error', validation.error);
    return;
  }

  let addedCount = 0;
  let overwritten = false;
  validation.results.forEach(function(item) {
    const finalDate = state.selectedDate || item.date;
    if (state.data[finalDate]) overwritten = true;
    state.data[finalDate] = { codes: item.codes, amounts: item.amounts };
    addedCount++;
  });

  state.inputText = '';
  state.selectedDate = '';
  state.selectedStocks = [];
  saveState();

  const baseMsg = overwritten ? addedCount + '日分を追加（一部上書き）' : addedCount + '日分のデータを追加しました';
  showMessage(overwritten ? 'warning' : 'success', baseMsg);
  render();
  uploadToGitHub();
}

function handleDeleteDate(date) {
  if (confirm(date + 'のデータを削除しますか？')) {
    delete state.data[date];
    state.selectedStocks = [];
    saveState();
    render();
    uploadToGitHub();
  }
}

function handleClearAll() {
  if (confirm('全てのデータを削除しますか？この操作は取り消せません。')) {
    state.data = {};
    state.selectedStocks = [];
    saveState();
    render();
    uploadToGitHub();
  }
}

function renderDailyTab() {

  const sortedDates = Object.keys(data).sort();
  if (sortedDates.length === 0) return '<div class="empty-state">📥 まずデータを入力してください</div>';

  // 全銘柄頻度
  const frequency = {};
  Object.values(data).forEach(function(d) {
    d.codes.forEach(function(code) { frequency[code] = (frequency[code] || 0) + 1; });
  });
  const allStockCodes = Object.keys(frequency).sort(function(a, b) { return frequency[b] - frequency[a]; });

  if (state.selectedStocks.length === 0) {
    const lastDate = sortedDates[sortedDates.length - 1];
    state.selectedStocks = data[lastDate].codes.slice(0, 10);
  }

  let html = '<div class="card"><div class="flex-between"><h2>銘柄別 売買代金推移（百万円）</h2><span style="font-size:0.85rem;color:#94a3b8;">表示中: ' + state.selectedStocks.length + ' / ' + allStockCodes.length + '銘柄</span></div><div class="chart-container" id="chart-daily-stock"></div></div>';

  html += '<div class="card"><div class="flex-between"><h3>表示銘柄の選択</h3><div class="btn-group">' +
    '<button class="btn btn-sm btn-yellow" onclick="setTop10()">TOP10</button>' +
    '<button class="btn btn-sm btn-blue" onclick="setAllStocks()">全選択</button>' +
    '<button class="btn btn-sm btn-gray" onclick="setSelectedStocks([])">クリア</button>' +
    '</div></div><div class="stock-select-grid">';

  allStockCodes.forEach(function(code) {
    const isSelected = state.selectedStocks.includes(code);
    const colorIdx = state.selectedStocks.indexOf(code);
    const stockName = getStockName(code);
    const cleanCode = code.replace('TSE:', '');
    const color = isSelected ? STOCK_COLORS[colorIdx % STOCK_COLORS.length] : null;
    const style = isSelected ? 'background:' + color + '30;border-color:' + color + ';color:' + color + ';' : '';
    html += '<button class="stock-select-btn' + (isSelected ? ' selected' : '') + '" style="' + style + '" onclick="toggleStock(\'' + code + '\')" title="' + escapeHtml(cleanCode) + '">' +
      '<div>' + escapeHtml(stockName || cleanCode) + '</div>' +
      (stockName ? '<div style="font-size:0.7rem;opacity:0.6;font-family:monospace;">' + escapeHtml(cleanCode) + '</div>' : '') +
      '</button>';
  });
  html += '</div></div>';

  html += '<div class="card"><h2>日次合計売買代金（参考・百万円）</h2><div class="chart-container" id="chart-daily-total" style="height:240px;"></div></div>';

  sortedDates.slice().reverse().forEach(function(date) {
    const sig = signals[date] || { newRankIn: [], rankOut: [], volumeIncrease: [], multiWeekContinue: [] };
    html += '<div class="card"><div class="flex-between"><h3>' + escapeHtml(date) + '</h3><div class="signal-bar">';
    if (sig.newRankIn.length > 0) html += '<span class="signal-new">🆕 ' + sig.newRankIn.length + '銘柄</span>';
    if (sig.rankOut.length > 0) html += '<span class="signal-out">🚪 ' + sig.rankOut.length + '銘柄</span>';
    if (sig.volumeIncrease.length > 0) html += '<span class="signal-up">📈 ' + sig.volumeIncrease.length + '銘柄</span>';
    html += '</div></div><div class="scroll">';

    data[date].codes.forEach(function(code, idx) {
      const isNew = sig.newRankIn.some(function(n) { return n.code === code; });
      const isRankOut = sig.rankOut.some(function(r) { return r.code === code; });
      const volumeInc = sig.volumeIncrease.find(function(v) { return v.code === code; });
      const isContinue = sig.multiWeekContinue.some(function(m) { return m.code === code; });
      const stockName = getStockName(code);
      const cleanCode = code.replace('TSE:', '');
      const rowClass = isNew ? 'ranking-row new' : isRankOut ? 'ranking-row rankout' : isContinue ? 'ranking-row continue' : 'ranking-row';

      html += '<div class="' + rowClass + '"><span class="rank-number">#' + (idx + 1) + '</span><div class="stock-info">';
      if (stockName) {
        html += '<div class="stock-name">' + escapeHtml(stockName) + '</div><div class="stock-code">' + escapeHtml(cleanCode) + '</div>';
      } else {
        html += '<div style="display:flex;align-items:center;gap:8px;"><span class="stock-code" style="font-size:0.9rem;">' + escapeHtml(cleanCode) + '</span><button class="register-btn" onclick="openRegisterModal(\'' + code + '\')">📝 登録</button></div>';
      }
      html += '</div><div class="badges">';
      if (isNew) html += '<span class="badge badge-new">新規</span>';
      if (isContinue) html += '<span class="badge badge-continue">継続</span>';
      if (volumeInc) html += '<span class="badge badge-up">↑' + volumeInc.increase + '%</span>';
      html += '</div><span class="volume">' + formatNumber(data[date].amounts[idx]) + 'M</span></div>';
    });

    html += '</div></div>';
  });

  return html;
}

function renderWeeklyTab() {
  const data = state.data;
  const sortedDates = Object.keys(data).sort();
  if (sortedDates.length < 2) return '<div class="empty-state">🔄 2日以上のデータを入力してください</div>';

  const signals = detectSignals();
  let totalNew = 0, totalOut = 0;
  Object.values(signals).forEach(function(s) { totalNew += s.newRankIn.length; totalOut += s.rankOut.length; });

  let html = '<div class="card"><h2>新規ランクイン × ランクアウト</h2>' +
    '<div class="stat-grid">' +
    '<div class="stat-card stat-yellow"><div class="stat-number" style="color:#fbbf24;">' + totalNew + '</div><div class="stat-label">新規ランクイン銘柄</div></div>' +
    '<div class="stat-card stat-red"><div class="stat-number" style="color:#ef4444;">' + totalOut + '</div><div class="stat-label">ランクアウト銘柄</div></div>' +
    '</div>' +
    '<div class="two-col">' +
    '<div><h3 style="color:#fbbf24;">🆕 新規ランクイン</h3><div class="scroll" style="max-height:300px;">';

  const allNewRankIn = [];
  Object.entries(signals).forEach(function(entry) {
    const date = entry[0]; const sig = entry[1];
    sig.newRankIn.forEach(function(item) { allNewRankIn.push(Object.assign({}, item, { date: date })); });
  });
  allNewRankIn.forEach(function(item) {
    const stockName = getStockName(item.code);
    const cleanCode = item.code.replace('TSE:', '');
    html += '<div style="padding:10px;background:rgba(51,65,85,0.5);border-radius:6px;margin-bottom:6px;"><div style="display:flex;justify-content:space-between;"><span style="font-weight:500;">' + escapeHtml(stockName || cleanCode) + '</span><span style="color:#94a3b8;font-size:0.8rem;">#' + item.rank + ' (' + item.date + ')</span></div>' + (stockName ? '<div style="font-size:0.75rem;color:#64748b;font-family:monospace;">' + escapeHtml(cleanCode) + '</div>' : '') + '</div>';
  });

  html += '</div></div><div><h3 style="color:#ef4444;">🚪 ランクアウト</h3><div class="scroll" style="max-height:300px;">';

  const allRankOut = [];
  Object.entries(signals).forEach(function(entry) {
    const date = entry[0]; const sig = entry[1];
    sig.rankOut.forEach(function(item) { allRankOut.push(Object.assign({}, item, { date: date })); });
  });
  allRankOut.forEach(function(item) {
    const stockName = getStockName(item.code);
    const cleanCode = item.code.replace('TSE:', '');
    html += '<div style="padding:10px;background:rgba(51,65,85,0.5);border-radius:6px;margin-bottom:6px;"><div style="display:flex;justify-content:space-between;"><span style="font-weight:500;">' + escapeHtml(stockName || cleanCode) + '</span><span style="color:#94a3b8;font-size:0.8rem;">前日#' + item.prevRank + ' (' + item.date + ')</span></div>' + (stockName ? '<div style="font-size:0.75rem;color:#64748b;font-family:monospace;">' + escapeHtml(cleanCode) + '</div>' : '') + '</div>';
  });

  html += '</div></div></div></div>';
  return html;
}

function renderStockTrackTab() {
  const data = state.data;
  const sortedDates = Object.keys(data).sort();
  if (sortedDates.length === 0) return '<div class="empty-state">📥 まずデータを入力してください</div>';

  const signals = detectSignals();
  let html = '<div class="card"><h2>TOP 10銘柄の順位推移</h2><div class="chart-container" id="chart-top10"></div></div>';

  // 継続銘柄集計
  const continueMap = {};
  Object.values(signals).forEach(function(s) {
    s.multiWeekContinue.forEach(function(item) {
      if (!continueMap[item.code]) continueMap[item.code] = 2;
      else continueMap[item.code]++;
    });
  });
  const continueItems = Object.keys(continueMap).map(function(code) { return { code: code, days: continueMap[code] }; }).sort(function(a, b) { return b.days - a.days; });

  html += '<div class="card"><h2>複数日継続銘柄</h2>';
  if (continueItems.length === 0) {
    html += '<div style="color:#94a3b8;">継続銘柄はまだありません</div>';
  } else {
    continueItems.forEach(function(item) {
      const stockName = getStockName(item.code);
      const cleanCode = item.code.replace('TSE:', '');
      html += '<div class="ranking-row continue" style="margin-bottom:8px;"><div class="stock-info">' +
        '<div class="stock-name">' + escapeHtml(stockName || cleanCode) + '</div>' +
        (stockName ? '<div class="stock-code">' + escapeHtml(cleanCode) + '</div>' : '') +
        '</div><span style="color:#93c5fd;">⭐ ' + item.days + '日連続</span></div>';
    });
  }
  html += '</div>';

  return html;
}

function generateReport() {
  const signals = detectSignals();
  state.reportData = getWeeklyReport(signals);
  state.reportGenerated = true;
  renderContent();
}

function renderReportTab() {
  const allDates = Object.keys(state.data).sort();
  if (allDates.length === 0) {
    return '<div class="empty-state">📥 まずデータを入力してください</div>';
  }

  if (!state.reportGenerated) {
    // ボタン画面：対象週を事前に表示
    const week = getWeekOfDates(allDates[allDates.length - 1]);
    const weekCount = allDates.filter(function(d) {
      const dt = new Date(d.replace(/\//g, '-') + 'T00:00:00');
      return dt >= week.monday && dt <= week.friday;
    }).length;
    return '<div class="card" style="text-align:center;padding:48px 24px;">' +
      '<div style="font-size:3rem;margin-bottom:16px;">📊</div>' +
      '<p style="color:#94a3b8;font-size:0.85rem;margin-bottom:6px;">対象週</p>' +
      '<p style="color:#fbbf24;font-size:1.2rem;font-weight:bold;margin-bottom:8px;">' + week.weekStart + ' ～ ' + week.weekEnd + '</p>' +
      '<p style="color:#94a3b8;font-size:0.85rem;margin-bottom:28px;">この週のデータ：' + weekCount + '日分</p>' +
      '<button class="btn btn-primary" style="max-width:280px;margin:0 auto;" onclick="generateReport()">週間レポートを生成する</button>' +
      '</div>';
  }

  const report = state.reportData;
  if (!report) return '<div class="empty-state">レポートを生成できませんでした</div>';

  let html = '<div style="display:flex;justify-content:flex-end;margin-bottom:12px;">' +
    '<button class="btn btn-gray btn-sm" onclick="state.reportGenerated=false;state.reportData=null;renderContent()">🔄 再生成</button>' +
    '</div>';

  html += '<div class="card" style="background:linear-gradient(to right,rgba(22,101,52,0.25),rgba(30,64,175,0.25));border-color:#16a34a;">' +
    '<h2 style="font-size:1.5rem;">📊 週間レポート</h2>' +
    '<p style="color:#cbd5e1;">対象週：' + report.weekStart + ' ～ ' + report.weekEnd + '（' + report.dates.length + '日分）</p>' +
    '</div>';

  html += '<div class="stat-grid">' +
    '<div class="stat-card stat-yellow"><div class="stat-number" style="color:#fbbf24;">' + report.newRankIn.length + '</div><div class="stat-label">新規ランクイン</div></div>' +
    '<div class="stat-card stat-red"><div class="stat-number" style="color:#ef4444;">' + report.rankOut.length + '</div><div class="stat-label">ランクアウト</div></div>' +
    '<div class="stat-card stat-green"><div class="stat-number" style="color:#22c55e;">' + report.volumeIncrease.length + '</div><div class="stat-label">売買代金↑10%以上</div></div>' +
    '</div>';

  html += '<div class="card"><h3>売買代金トレンド</h3><div class="chart-container" id="chart-report-total" style="height:260px;"></div></div>';

  const topIncrease = report.volumeIncrease.slice().sort(function(a, b) { return parseFloat(b.increase) - parseFloat(a.increase); }).slice(0, 5);
  html += '<div class="card"><h3>最大変動銘柄 TOP 5</h3>';
  topIncrease.forEach(function(item) {
    const stockName = getStockName(item.code);
    const cleanCode = item.code.replace('TSE:', '');
    html += '<div class="ranking-row" style="margin-bottom:8px;"><div class="stock-info"><div class="stock-name">' + escapeHtml(stockName || cleanCode) + '</div>' + (stockName ? '<div class="stock-code">' + escapeHtml(cleanCode) + '</div>' : '') + '</div><div style="display:flex;gap:12px;align-items:center;"><span style="color:#94a3b8;font-size:0.85rem;">' + item.date + '</span><span style="color:#22c55e;font-weight:bold;">↑' + item.increase + '%</span></div></div>';
  });
  html += '</div>';

  return html;
}

function attachInputListeners() {
  var textInput = document.getElementById('textInput');
  if (!textInput) return;
  textInput.addEventListener('paste', function(e) {
    e.preventDefault();
    var pasted = (e.clipboardData || window.clipboardData).getData('text');
    textInput.value = pasted;
    var validation = validateFormat(pasted.trim());
    if (validation.valid && validation.results.length > 0) {
      setTimeout(handleAddData, 50);
    }
  });
}

function renderContent() {
  const content = document.getElementById('content');
  if (!content) return;
  let html = '';
  if (state.activeTab === 'input') html = renderInputTab();
  else if (state.activeTab === 'daily') html = renderDailyTab();
  else if (state.activeTab === 'weekly') html = renderWeeklyTab();
  else if (state.activeTab === 'stocktrack') html = renderStockTrackTab();
  else if (state.activeTab === 'report') html = renderReportTab();
  content.innerHTML = html;

  // ペーストリスナーをアタッチ
  if (state.activeTab === 'input') attachInputListeners();

  // チャート描画（次のtick）
  setTimeout(drawCharts, 50);
}

function drawCharts() {
  const data = state.data;
  const sortedDates = Object.keys(data).sort();

  if (state.activeTab === 'daily' && sortedDates.length > 0) {
    // 銘柄別推移
    const chartData = sortedDates.map(function(date) {
      const entry = { date: date.substring(5) };
      data[date].codes.forEach(function(code, idx) { entry[code] = data[date].amounts[idx]; });
      return entry;
    });
    const series = state.selectedStocks.map(function(code, idx) {
      return { key: code, label: getStockName(code) || code.replace('TSE:', ''), color: STOCK_COLORS[idx % STOCK_COLORS.length] };
    });
    drawLineChart('chart-daily-stock', chartData, series, {
      yFormatter: function(v) { return Math.round(v).toLocaleString(); }
    });

    // 日次合計
    const totalData = sortedDates.map(function(date) {
      return { date: date.substring(5), volume: data[date].amounts.reduce(function(a, b) { return a + b; }, 0) };
    });
    drawBarChart('chart-daily-total', totalData, 'volume', { color: '#fbbf24' });
  }

  if (state.activeTab === 'stocktrack' && sortedDates.length > 0) {
    const lastDate = sortedDates[sortedDates.length - 1];
    const top10Codes = data[lastDate].codes.slice(0, 10);
    const chartData = sortedDates.map(function(date) {
      const entry = { date: date.substring(5) };
      data[date].codes.slice(0, 10).forEach(function(code, idx) {
        entry[code] = idx + 1;
      });
      return entry;
    });
    const series = top10Codes.map(function(code, idx) {
      return { key: code, label: getStockName(code) || code.replace('TSE:', ''), color: STOCK_COLORS[idx % STOCK_COLORS.length] };
    });
    drawLineChart('chart-top10', chartData, series, {
      reversed: true,
      forceMin: 1,
      forceMax: 10,
      yFormatter: function(v) { return Math.round(v) + '位'; }
    });
  }

  if (state.activeTab === 'report' && state.reportData) {
    const totalData = state.reportData.dates.map(function(date) {
      return { date: date.substring(5), volume: data[date].amounts.reduce(function(a, b) { return a + b; }, 0) };
    });
    drawBarChart('chart-report-total', totalData, 'volume', { color: '#10b981' });
  }
}

function setTop10() {
  const sortedDates = Object.keys(state.data).sort();
  if (sortedDates.length === 0) return;
  const lastDate = sortedDates[sortedDates.length - 1];
  state.selectedStocks = state.data[lastDate].codes.slice(0, 10);
  renderContent();
}

function setAllStocks() {
  const frequency = {};
  Object.values(state.data).forEach(function(d) {
    d.codes.forEach(function(code) { frequency[code] = (frequency[code] || 0) + 1; });
  });
  state.selectedStocks = Object.keys(frequency).sort(function(a, b) { return frequency[b] - frequency[a]; });
  renderContent();
}

function render() {
  renderMessage();
  renderDataCount();
  renderContent();
  renderModal();
}

// ============================================
// 初期化
// ============================================
document.addEventListener('DOMContentLoaded', async function() {
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      setActiveTab(tab.dataset.tab);
    });
  });

  // まずローカルキャッシュで即時表示
  render();

  // GitHub が有効なら起動時に最新データをフェッチ
  const cfg = state.githubConfig;
  if (cfg.enabled && cfg.token && cfg.owner && cfg.repo) {
    showMessage('warning', '☁️ GitHubからデータを読み込み中...', 0);
    const ok = await loadFromGitHub();
    if (ok) {
      showMessage('success', 'GitHubからデータを読み込みました', 3000);
    } else {
      showMessage('error', 'GitHub読み込み失敗。ローカルキャッシュを表示しています', 5000);
    }
    render();
  }

  // ウィンドウリサイズ時にチャート再描画
  window.addEventListener('resize', function() {
    clearTimeout(window._resizeTimer);
    window._resizeTimer = setTimeout(drawCharts, 200);
  });
});
</script>
